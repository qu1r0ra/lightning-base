# lightning.pytorch==2.x
seed_everything: 42
trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 100
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: lightning-uv-wandb-template
      log_model: true
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        filename: "model-{epoch:02d}-{val_loss:.4f}"
        save_top_k: 1
        mode: min
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_loss
        patience: 5
        mode: min

model:
  class_path: lightning_uv_wandb_template.models.classifier.TemplateClassifier
  init_args:
    lr: 0.001
    weight_decay: 0.01
    dropout: 0.1
    scheduler_patience: 3
    scheduler_factor: 0.1
    num_classes: 6
    model:
      class_path: torchvision.models.resnet18
      init_args:
        num_classes: 6

data:
  class_path: lightning_uv_wandb_template.data.datamodule.TemplateDataModule
  init_args:
    data_dir: data
    batch_size: 32
    val_split: 0.2
    num_workers: 4
    seed: 42
    k_fold: 1
    fold_index: 0
